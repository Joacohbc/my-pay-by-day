name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'mypaybyday/**'
  pull_request:
    branches: [master]
    paths:
      - 'mypaybyday/**'

defaults:
  run:
    working-directory: mypaybyday

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build
        run: ./mvnw clean compile -B

      - name: Run tests
        run: ./mvnw verify -B
