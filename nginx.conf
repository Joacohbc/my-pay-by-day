server {
    listen 80;

    # Proxy /api/* requests to the backend, stripping the /api prefix
    # e.g. GET /api/events  →  backend:8080/events
    location /api/ {
        proxy_pass         http://4y-backend:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy everything else to the frontend (nginx serving the SPA)
    location / {
        proxy_pass         http://4y-frontend:80/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
