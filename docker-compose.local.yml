# docker-compose.local.yml
#
# Single-domain setup — nginx reverse proxy sits in front of both services:
#   GET /api/*   →  backend:8080  (prefix stripped)
#   GET /*       →  frontend:80
#
# Usage:
#   export DB_FIELD_ENCRYPTION_KEY=<your-key-longer-than-32-chars>
#   docker compose -f docker-compose.local.yml up
#
# Port exposed on the host: http://localhost:8080  (override with PORT=xxxx)

services:

  4y-proxy:
    image: nginx:stable-alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - 4y-frontend
      - 4y-backend

  4y-frontend:
    image: ghcr.io/joacohbc/my-pay-by-day/frontend
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - 4y-backend

  4y-backend:
    image: ghcr.io/joacohbc/my-pay-by-day/backend
    environment:
      - DB_FIELD_ENCRYPTION_KEY=${DB_FIELD_ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=http://4y-ollama:11434
      - OLLAMA_MODEL_ID=${OLLAMA_MODEL_ID}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL}
      - RAG_STORAGE_PATH=${RAG_STORAGE_PATH}
      - QUARKUS_DATASOURCE_JDBC_URL=${QUARKUS_DATASOURCE_JDBC_URL}
    volumes:
      - db_data:/work/data
    depends_on:
      4y-ollama:
        condition: service_healthy

  4y-ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # A lightweight command to ensure the models are pulled right after startup
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL_ID} && ollama pull ${OLLAMA_EMBEDDING_MODEL} && wait" ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  ollama_data:
