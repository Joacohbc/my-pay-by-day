# Local compose: builds every service image from source.
# For production, use docker-compose.yml, which pulls the pre-built images.
#
# ── Security hardening (gateway/frontend/backend/chatbot/markitdown) ──────
# security_opt: no-new-privileges:true
#   Bloquea que un proceso dentro del contenedor gane privilegios nuevos vía
#   setuid/setcap. Aunque el proceso sea comprometido, no puede escalar a root real.
#
# cap_drop: ALL
#   Quita todas las capabilities de Linux que Docker da por defecto (manipular
#   red, cambiar UID, matar procesos, etc.). Si el proceso es comprometido, no
#   puede hacer casi nada a nivel kernel aunque corra como root.
#
# cap_add (solo gateway/frontend, procesos nginx):
#   NET_BIND_SERVICE  -> necesaria para bindear el puerto 80 (<1024).
#   SETUID / SETGID   -> el master de nginx arranca como root para bindear :80,
#                        pero baja privilegios a los workers vía setuid()/setgid();
#                        sin estas dos, esa llamada falla y nginx no levanta.
#   backend/chatbot/markitdown no necesitan cap_add: ya corren como usuario no-root
#   desde el arranque y no bindean puertos privilegiados.
services:

  # ── Application services ─────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    environment:
      - MYPAYBYDAY_FILES_MAX_SIZE=${MYPAYBYDAY_FILES_MAX_SIZE:-10485760}
    ports:
      - "80:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # bind :80
      - SETUID            # nginx master drops privilege to the nginx user for workers
      - SETGID
    # Not read_only: entrypoint.sh rewrites /etc/nginx/conf.d/default.conf at startup.
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      chatbot:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # bind :80
      - SETUID            # nginx master drops privilege to the nginx user for workers
      - SETGID
    # Not read_only: entrypoint.sh writes /usr/share/nginx/html/env.js at startup.
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      - DB_FIELD_ENCRYPTION_KEY=${DB_FIELD_ENCRYPTION_KEY}
      - QUARKUS_DATASOURCE_JDBC_URL=${QUARKUS_DATASOURCE_JDBC_URL:-jdbc:sqlite:/data/mypaybyday.db}
      - TZ=${TZ:-UTC}
      - MYPAYBYDAY_CORS_ORIGINS=${MYPAYBYDAY_CORS_ORIGINS:-}
      - MYPAYBYDAY_FILES_MAX_SIZE=${MYPAYBYDAY_FILES_MAX_SIZE:-10485760}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - MARKITDOWN_URL=http://markitdown:8590
    volumes:
      - backend_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      markitdown:
        condition: service_healthy
    restart: unless-stopped

  chatbot:
    build:
      context: .
      dockerfile: docker/chatbot/Dockerfile
    environment:
      - BACKEND_URL=http://backend:8080
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - MODEL_LARGE=${MODEL_LARGE:-google/gemini-2.5-flash}
      - MODEL_FAST=${MODEL_FAST:-google/gemini-flash-lite}
      - MODEL_AUDIO=${MODEL_AUDIO:-openai/whisper-large-v3-turbo}
      - AGENT_MAX_STEPS=${AGENT_MAX_STEPS:-25}
      - SUBAGENT_MAX_STEPS=${SUBAGENT_MAX_STEPS:-12}
      - AGENT_MAX_CHAT_MESSAGES=${AGENT_MAX_CHAT_MESSAGES:-150}
      
      # 'production' makes the chatbot default to JSON logs; keep LOG_LEVEL=info so the
      # verbose content (prompts/replies/tool args) stays at DEBUG and off prod logs.
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_MAX_FIELD_CHARS=${LOG_MAX_FIELD_CHARS:-800}
      - LOG_TIMESTAMPS=${LOG_TIMESTAMPS:-true}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - CHATBOT_DB_PATH=${CHATBOT_DB_PATH:-/data/chatbot.db}
    volumes:
      - chatbot_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  markitdown:
    build:
      context: .
      dockerfile: docker/backend/markitdown/Dockerfile
    environment:
      - PORT=8590
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/appuser
    restart: unless-stopped

  # ── Observability stack ──────────────────────────────────────────────
  # Prometheus scrapes each service directly: backend:8080/q/metrics (Micrometer),
  # chatbot:3001/metrics (prom-client), and the nginx exporters for gateway/frontend.
  # Alloy tails every container's JSON logs into Loki; Grafana ties metrics + logs
  # together and lets you trace one request across services by its X-Request-Id.
  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - chatbot
    restart: unless-stopped

  gateway-metrics:
    image: nginx/nginx-prometheus-exporter:1.4.0
    command:
      - --nginx.scrape-uri=http://gateway:8081/stub_status
    depends_on:
      - gateway
    restart: unless-stopped

  frontend-metrics:
    image: nginx/nginx-prometheus-exporter:1.4.0
    command:
      - --nginx.scrape-uri=http://frontend:8081/stub_status
    depends_on:
      - frontend
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./docker/observability/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  backend_data:
  chatbot_data:
  prometheus_data:
  loki_data:
  alloy_data:
  grafana_data:
