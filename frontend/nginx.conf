# Frontend SPA server. Serves the Vite build with client-side-routing fallback.
# A second server on :8081 exposes stub_status for the Prometheus nginx exporter,
# restricted to private/compose networks.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # TLS terminates upstream; keep redirects relative to avoid mixed-content.
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8081;

    location = /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location / {
        return 404;
    }
}
