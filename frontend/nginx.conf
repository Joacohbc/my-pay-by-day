# Frontend SPA server. Serves the Vite build with client-side-routing fallback.

# Client-error sink: the browser POSTs a JSON batch of unhandled errors here and this line format
# emits the raw body verbatim to stdout, where Alloy parses it as JSON and ships it to Loki under
# service=frontend. $request_body is only populated in a proxy_pass location, hence the loopback.
log_format clientlog escape=none '$request_body';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # TLS terminates upstream; keep redirects relative to avoid mixed-content.
    absolute_redirect off;

    # Container HEALTHCHECK target.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Unhandled-error collector. proxy_pass forces nginx to read the request body so it becomes
    # available as $request_body for the clientlog access_log; the loopback sink just returns 204.
    location = /client-logs {
        if ($request_method != POST) { return 405; }
        client_max_body_size 256k;
        client_body_buffer_size 256k;
        access_log /dev/stdout clientlog;
        proxy_pass http://127.0.0.1:80/__client_logs_sink;
    }

    location = /__client_logs_sink {
        access_log off;
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
