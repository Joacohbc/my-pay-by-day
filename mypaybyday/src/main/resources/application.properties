quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:mypaybyday.db?busy_timeout=10000&journal_mode=WAL}

# SQLite: use a small pool with WAL mode (prevents acquisition timeout)
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.acquisition-timeout=30s

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# Encryption key (explicitly configured for StartupLogger)
db.field.encryption.key=${DB_FIELD_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Timezone
mypaybyday.timezone=${TZ:UTC}

# Files configuration
mypaybyday.files.max-size=${MYPAYBYDAY_FILES_MAX_SIZE:10485760}

# --- AI Model configuration (vanilla LangChain4j) ---
# Primary model: used for chat with tools (CreateFinanceEventService) and structured extraction (FinanceExtractor)
ai.primary.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.primary.api-key=${OPENROUTER_API_KEY:changeme}
ai.primary.model-name=${AI_PRIMARY_MODEL:openai/gpt-oss-120b}
ai.primary.timeout=${AI_PRIMARY_TIMEOUT:60}

# Vision model: used for image analysis (ViewImageService) — configure a different model here if desired
ai.vision.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.vision.api-key=${OPENROUTER_API_KEY:changeme}
ai.vision.model-name=${AI_VISION_MODEL:qwen/qwen3.5-flash-02-23}
ai.vision.timeout=${AI_VISION_TIMEOUT:180}

# Audio model: used for voice transcription with dedicated base URL and API key
ai.audio.base-url=${BASE_URL:https://openrouter.ai/api/v1}}
ai.audio.api-key=${OPENROUTER_API_KEY:changeme}
ai.audio.model-name=${AI_AUDIO_MODEL:google/gemini-3.1-pro-preview}
ai.audio.timeout=${AI_AUDIO_TIMEOUT:180}
