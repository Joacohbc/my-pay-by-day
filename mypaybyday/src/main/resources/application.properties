quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:mypaybyday.db}

# SQLite: keep pool small; WAL mode (configured via SQLiteConfig) handles concurrent reads
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.min-size=1

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# Encryption key (explicitly configured for StartupLogger)
db.field.encryption.key=${DB_FIELD_ENCRYPTION_KEY}

# Ollama server configuration
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-name=${OLLAMA_MODEL_ID:qwen2.5:3b}
quarkus.langchain4j.ollama.timeout=180s
quarkus.langchain4j.ollama.log-requests-curl=true

# Desactivar el Dev Service (Para que Quarkus no intente levantar su propio Docker)
quarkus.langchain4j.ollama.devservices.enabled=false