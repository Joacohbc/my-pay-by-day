# Encryption key — set DB_FIELD_ENCRYPTION_KEY env var in production.
# The %dev default is only for local development; never use it in production.
%dev.db.field.encryption.key=dev-only-insecure-key

quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:mypaybyday.db
# SQLite: keep pool small; WAL mode (configured via SQLiteConfig) handles concurrent reads
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.min-size=1
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# CORS — list the allowed origins in the cors.origins property (comma-separated).
# Example: cors.origins=http://localhost:5173,https://app.mypaybyday.com
quarkus.http.cors=true
quarkus.http.cors.origins=${cors.origins:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition,Location
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

