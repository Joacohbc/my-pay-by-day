quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:mypaybyday.db?busy_timeout=10000&journal_mode=WAL}

# Limit connections to queue requests at the application level
# and avoid saturating the SQLite file. If your app performs many writes, max-size=1 is the safest.
quarkus.datasource.jdbc.max-size=1
quarkus.datasource.jdbc.min-size=1

# 3. Enable SQLite PRAGMAs via driver properties

# WAL mode to allow concurrent reads with one write
quarkus.datasource.jdbc.additional-jdbc-properties.journal_mode=WAL
# Wait time (in ms) before throwing the "database is locked" error
quarkus.datasource.jdbc.additional-jdbc-properties.busy_timeout=5000
# NORMAL synchronization is recommended with WAL to improve write performance
quarkus.datasource.jdbc.additional-jdbc-properties.synchronous=NORMAL

quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.database.generation=update
# %dev.quarkus.hibernate-orm.database.generation=drop-and-create

# Show SQL
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.bind-parameters=true

quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# Encryption key (explicitly configured for StartupLogger)
db.field.encryption.key=${DB_FIELD_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Timezone
mypaybyday.timezone=${TZ:UTC}

# --- File logging (general app log, JSON) ---
quarkus.log.file.enable=true
quarkus.log.file.path=${MYPAYBYDAY_LOG_FILE_PATH:/data/logs/app.log}
quarkus.log.file.level=INFO
quarkus.log.file.json=true
quarkus.log.file.json.pretty-print=false
quarkus.log.file.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=10
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.rotation.rotate-on-boot=false
%dev.quarkus.log.file.path=logs/app.log

# Console stays plain text in dev for readability, JSON in prod
quarkus.log.console.json=false
%prod.quarkus.log.console.json=true

# --- Dedicated audit log file (JSON) ---
quarkus.log.handler.file."AUDIT".enable=true
quarkus.log.handler.file."AUDIT".path=${MYPAYBYDAY_AUDIT_LOG_PATH:/data/logs/audit.log}
quarkus.log.handler.file."AUDIT".level=INFO
quarkus.log.handler.file."AUDIT".json=true
quarkus.log.handler.file."AUDIT".json.pretty-print=false
quarkus.log.handler.file."AUDIT".json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
quarkus.log.handler.file."AUDIT".rotation.max-file-size=10M
quarkus.log.handler.file."AUDIT".rotation.max-backup-index=20
quarkus.log.handler.file."AUDIT".rotation.file-suffix=.yyyy-MM-dd
%dev.quarkus.log.handler.file."AUDIT".path=logs/audit.log
quarkus.log.category."audit".level=INFO
quarkus.log.category."audit".use-parent-handlers=false
quarkus.log.category."audit".handlers=AUDIT

# --- Dedicated error/business log file (JSON) ---
quarkus.log.handler.file."ERRORS".enable=true
quarkus.log.handler.file."ERRORS".path=${MYPAYBYDAY_ERROR_LOG_PATH:/data/logs/errors.log}
quarkus.log.handler.file."ERRORS".level=WARN
quarkus.log.handler.file."ERRORS".json=true
quarkus.log.handler.file."ERRORS".json.pretty-print=false
quarkus.log.handler.file."ERRORS".json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
quarkus.log.handler.file."ERRORS".rotation.max-file-size=10M
quarkus.log.handler.file."ERRORS".rotation.max-backup-index=20
quarkus.log.handler.file."ERRORS".rotation.file-suffix=.yyyy-MM-dd
%dev.quarkus.log.handler.file."ERRORS".path=logs/errors.log
quarkus.log.category."system-error".level=WARN
quarkus.log.category."system-error".use-parent-handlers=false
quarkus.log.category."system-error".handlers=ERRORS

# Files configuration
mypaybyday.files.max-size=${MYPAYBYDAY_FILES_MAX_SIZE:10485760}

# --- AI Model configuration (vanilla LangChain4j) ---
# Primary model: used for chat with tools (CreateFinanceEventService) and structured extraction (FinanceExtractor)
ai.primary.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.primary.api-key=${OPENROUTER_API_KEY:changeme}
ai.primary.model-name=${AI_PRIMARY_MODEL:google/gemini-3-flash-preview}
ai.primary.timeout=${AI_PRIMARY_TIMEOUT:60}

# Vision model: used for image analysis (ViewImageService) — configure a different model here if desired
ai.vision.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.vision.api-key=${OPENROUTER_API_KEY:changeme}
ai.vision.model-name=${AI_VISION_MODEL:qwen/qwen3.5-flash-02-23}
ai.vision.timeout=${AI_VISION_TIMEOUT:180}

# Audio model: used for voice transcription with dedicated base URL and API key
ai.audio.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.audio.api-key=${OPENROUTER_API_KEY:changeme}
ai.audio.model-name=${AI_AUDIO_MODEL:google/gemini-3.1-flash-lite-preview}
ai.audio.timeout=${AI_AUDIO_TIMEOUT:180}

# Agent model: long-running background tasks — 600s timeout
ai.agent.base-url=${BASE_URL:https://openrouter.ai/api/v1}
ai.agent.api-key=${OPENROUTER_API_KEY:changeme}
ai.agent.model-name=${AI_AGENT_MODEL:google/gemini-3-flash-preview}
ai.agent.timeout=${AI_AGENT_TIMEOUT:600}
