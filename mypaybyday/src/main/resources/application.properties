# quarkus.langchain4j.ai.gemini.log-responses=false

# Default OpenAI configuration (OpenRouter)
quarkus.langchain4j.openai.base-url=https://openrouter.ai/api/v1
quarkus.langchain4j.openai.api-key=${OPENROUTER_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=google/gemini-2.5-flash-lite
quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.openai.timeout=120s
quarkus.langchain4j.openai.log-requests=false
quarkus.langchain4j.openai.log-responses=false
