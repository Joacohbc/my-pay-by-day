quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:sqlite:mypaybyday.db}

# Limit connections to queue requests at the application level
# and avoid saturating the SQLite file. If your app performs many writes, max-size=1 is the safest.
quarkus.datasource.jdbc.max-size=1
quarkus.datasource.jdbc.min-size=1

# Enable SQLite PRAGMAs via driver properties

# WAL mode to allow concurrent reads with one write
quarkus.datasource.jdbc.additional-jdbc-properties.journal_mode=WAL
# Wait time (in ms) before throwing the "database is locked" error
quarkus.datasource.jdbc.additional-jdbc-properties.busy_timeout=5000
# NORMAL synchronization is recommended with WAL to improve write performance
quarkus.datasource.jdbc.additional-jdbc-properties.synchronous=NORMAL

# Schema is owned by Flyway (see src/main/resources/db/migration). Hibernate must
# not touch it, so generation is disabled across all profiles.
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.sql-load-script=no-file

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1
quarkus.flyway.locations=classpath:db/migration

quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.store-schema-directory=target/openapi

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.headers=Content-Type,Accept,X-Timezone,X-Language,X-Currency,X-Request-Id,X-Source
quarkus.http.cors.exposed-headers=X-Request-Id

# Logging
# Text (human-readable) in dev, structured JSON in prod for auditing/aggregation (Loki/Grafana).
# %X{requestId} injects the per-request correlation ID populated by CorrelationIdFilter into every line.
quarkus.log.level=INFO
quarkus.log.category."com.mypaybyday".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) [req=%X{requestId} src=%X{source}] %s%e%n
quarkus.log.console.json.enabled=false
%prod.quarkus.log.console.json.enabled=true
%prod.quarkus.log.console.json.additional-field."service".value=backend

# Timezone
mypaybyday.timezone=${TZ:UTC}

# Proxy Forwarding (fixes Mixed Content / HTTPS issues behind Nginx)
quarkus.http.proxy.proxy-address-forwarding=true

# Files configuration
quarkus.http.limits.max-body-size=${MYPAYBYDAY_FILES_MAX_SIZE:10485760}
mypaybyday.files.max-size=${MYPAYBYDAY_FILES_MAX_SIZE:10485760}
mypaybyday.markitdown.url=${MARKITDOWN_URL:}

# AI logic has been moved to the standalone Node chatbot service (chatbot/), which
# talks to OpenRouter via the Vercel AI SDK and calls these REST endpoints as tools.

# ────────────────────────────────────────────────────────────
# Profile: dev (./mvnw quarkus:dev)
# ────────────────────────────────────────────────────────────
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.bind-parameters=true
%dev.mypaybyday.markitdown.url=${MARKITDOWN_URL:http://localhost:8590}
%dev.quarkus.http.cors.origins=*

# Falls back to an insecure development default when unset.
%dev.db.field.encryption.key=${DB_FIELD_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

# ────────────────────────────────────────────────────────────
# Profile: test (./mvnw test) — throwaway DB under target/, never the
# developer's mypaybyday.db. V1 must run from scratch, clean schema every run.
# ────────────────────────────────────────────────────────────
%test.quarkus.datasource.jdbc.url=jdbc:sqlite:target/test.db
%test.quarkus.flyway.baseline-on-migrate=false
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.clean-disabled=false
%test.db.field.encryption.key=0123456789abcdef0123456789abcdef

# ────────────────────────────────────────────────────────────
# Profile: prod (packaged jar / Docker image)
# ────────────────────────────────────────────────────────────
%prod.quarkus.swagger-ui.always-include=false
# Empty origins = same-origin only (frontend is served behind nginx).
%prod.quarkus.http.cors.origins=${MYPAYBYDAY_CORS_ORIGINS:}
# No default: a missing DB_FIELD_ENCRYPTION_KEY aborts startup instead of
# running with a weak key.
%prod.db.field.encryption.key=${DB_FIELD_ENCRYPTION_KEY}
