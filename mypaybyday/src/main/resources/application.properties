quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:mypaybyday.db

# SQLite: keep pool small; WAL mode (configured via SQLiteConfig) handles concurrent reads
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.min-size=1

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Swagger UI / OpenAPI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# CORS — override via QUARKUS_HTTP_CORS_ORIGINS env var (comma-separated, no spaces).
# Example: QUARKUS_HTTP_CORS_ORIGINS=http://localhost:5173,https://app.mypaybyday.com
quarkus.http.cors=true
quarkus.http.cors.origins=${cors.origins:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition,Location
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# CORS debug logging — only in dev; prints when a request is rejected due to CORS
quarkus.log.category."io.quarkus.vertx.http.runtime.cors".level=DEBUG

