log_format custom_combined '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'tz="$http_x_timezone" lang="$http_x_language"';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout custom_combined;

    # Proxy /api/* to local Quarkus backend, stripping the /api prefix
    # e.g. GET /api/events  →  localhost:8080/events
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
    }

    # Proxy /ws/* to local Quarkus WebSocket backend (path preserved)
    location /ws/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Serve SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
