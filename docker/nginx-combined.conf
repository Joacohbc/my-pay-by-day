# Reuse the client-supplied correlation ID, or fall back to nginx's own unique $request_id
# so every request is traceable end-to-end even when the caller didn't send one.
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format custom_combined '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'tz="$http_x_timezone" lang="$http_x_language" req="$req_id"';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx only sees plain HTTP (TLS terminates at the proxy in front), so any
    # absolute self-redirect would be emitted as http:// and get blocked by the
    # browser as mixed content. Relative redirects survive the HTTPS front-end.
    absolute_redirect off;
    
    # Allow larger uploads (like JSON exports)
    client_max_body_size __MYPAYBYDAY_FILES_MAX_SIZE__;

    access_log /dev/stdout custom_combined;

    # Proxy AI endpoints to the local Node chatbot service, stripping the /api prefix.
    # e.g. POST /api/ai/chat  →  localhost:3001/ai/chat (SSE streaming, buffering off)
    location /api/ai/ {
        proxy_pass         http://127.0.0.1:3001/ai/;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_read_timeout 3600s;
    }

    # Agent task lifecycle + SSE streaming, also served by the Node chatbot service.
    # e.g. GET /api/agent-tasks/{id}/stream  →  localhost:3001/agent-tasks/{id}/stream
    # No trailing slash: the collection itself lives at /api/agent-tasks, and a
    # slash-terminated location would answer it with nginx's automatic 301 instead
    # of proxying (breaking list/create requests).
    location /api/agent-tasks {
        proxy_pass         http://127.0.0.1:3001/agent-tasks;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_read_timeout 3600s;
    }

    # Proxy the rest of /api/* to local Quarkus backend, stripping the /api prefix
    # e.g. GET /api/events  →  localhost:8080/events
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_read_timeout 3600s;
    }

    # Prometheus scrape endpoints. Exposed only to private/compose networks so metrics never
    # leak publicly. The backend registers /q/metrics (Micrometer); the chatbot serves /metrics
    # (prom-client). Prometheus scrapes them via the app container on the compose network.
    location = /q/metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass       http://127.0.0.1:8080/q/metrics;
        proxy_set_header Host $host;
    }

    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass       http://127.0.0.1:3001/metrics;
        proxy_set_header Host $host;
    }

    # Serve SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
