global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend (Quarkus Micrometer) — scraped directly on the service port.
  - job_name: backend
    metrics_path: /q/metrics
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: backend

  # Chatbot (Node prom-client) — scraped directly on the service port.
  - job_name: chatbot
    metrics_path: /metrics
    static_configs:
      - targets: ['chatbot:3001']
        labels:
          service: chatbot

  # nginx exporters (stub_status) for the gateway and frontend.
  - job_name: nginx-gateway
    static_configs:
      - targets: ['gateway-metrics:9113']
        labels:
          service: gateway

  - job_name: nginx-frontend
    static_configs:
      - targets: ['frontend-metrics:9113']
        labels:
          service: frontend

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
