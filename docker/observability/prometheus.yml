global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /q/metrics
    static_configs:
      - targets: ['4y:80']
        labels:
          service: backend

  - job_name: chatbot
    metrics_path: /metrics
    static_configs:
      - targets: ['4y:80']
        labels:
          service: chatbot

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
