apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      derivedFields:
        - name: Request trace
          matcherRegex: '"requestId":"([^"]+)"'
          url: '/d/mpbd-system?var-requestId=${__value.raw}'
          urlDisplayLabel: View request trace
