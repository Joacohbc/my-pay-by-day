# API gateway for the docker-compose split. Proxies /api to the backend and chatbot
# services and everything else to the frontend service. Terminates uploads (body-size
# limit) and stamps the correlation/source headers. A second server on :8081 exposes
# stub_status for the Prometheus nginx exporter.

# Reuse the client-supplied correlation ID, or fall back to nginx's own $request_id.
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Behind Cloudflare Tunnel the TCP peer is the cloudflared sidecar; the real client IP
# arrives in CF-Connecting-IP. Fall back to $remote_addr for direct access.
map $http_cf_connecting_ip $real_client_ip {
    default $http_cf_connecting_ip;
    ''      $remote_addr;
}

# TLS terminates upstream, so honour the forwarded scheme (default https).
map $http_x_forwarded_proto $forwarded_scheme {
    default $http_x_forwarded_proto;
    ''      https;
}

log_format gateway '$real_client_ip - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'src="$http_x_source" tz="$http_x_timezone" lang="$http_x_language" '
                   'req="$req_id" xfp="$http_x_forwarded_proto"';

server {
    listen 80;
    absolute_redirect off;
    client_max_body_size __MYPAYBYDAY_FILES_MAX_SIZE__;
    access_log /dev/stdout gateway;

    # AI endpoints → chatbot (SSE streaming, buffering off).
    location /api/ai/ {
        proxy_pass         http://chatbot:3001/ai/;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_set_header   X-Source          $http_x_source;
        proxy_read_timeout 3600s;
    }

    # Agent task lifecycle + SSE stream → chatbot. No trailing slash (collection lives at /api/agent-tasks).
    location /api/agent-tasks {
        proxy_pass         http://chatbot:3001/agent-tasks;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_set_header   X-Source          $http_x_source;
        proxy_read_timeout 3600s;
    }

    # Everything else under /api → Quarkus backend (strips the /api prefix).
    location /api/ {
        proxy_pass         http://backend:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header   X-Timezone        $http_x_timezone;
        proxy_set_header   X-Language        $http_x_language;
        proxy_set_header   X-Request-Id      $req_id;
        proxy_set_header   X-Source          $http_x_source;
        proxy_read_timeout 3600s;
    }

    # SPA and static assets → frontend service.
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $real_client_ip;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_scheme;
    }
}

server {
    listen 8081;

    location = /stub_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location / {
        return 404;
    }
}
